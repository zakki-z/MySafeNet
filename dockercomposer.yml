services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "85:85"  # Changed from 85:85 to match nginx.conf
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - spring-backend
      - angular-web
    networks:
      - app-network

  postgres:
    image: postgres:latest
    container_name: postgres-db
    environment:
      - POSTGRES_DB=chatapp
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  spring-backend:
    build: ./backend-springboot/chatappSpringboot
    container_name: spring-backend
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/chatapp
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=chat
      - SERVER_PORT=8083
    depends_on:
      - postgres
    networks:
      - app-network

  angular-web:
    build: ./frontend-angular/mychat
    container_name: angular-web
    ports:
      - "8081:8081"  # Added port mapping to match nginx.conf
    networks:
      - app-network
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"
    depends_on:
      - postgres
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: