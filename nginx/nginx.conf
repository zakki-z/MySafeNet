events { }

http {
    upstream symfony-gateway {
        server symfony-gateway:80;
    }

    upstream spring-backend {
        server spring-backend:8080;
    }

    upstream angular-web {
        server angular-web:8081;
    }

    upstream flutter-mobile {
        server flutter-mobile:80;
    }

    server {
        listen 80;

        location /gateway/ {
            proxy_pass http://symfony-gateway/;
        }

        location /api/ {
            proxy_pass http://spring-backend/;
        }

        location /web/ {
            proxy_pass http://angular-web/;
        }

        location /mobile/ {
            proxy_pass http://flutter-mobile/;
        }

        # Optional: Serve Electron’s web output if relevant
        location /desktop/ {
            proxy_pass http://electron-desktop/;
        }
    }
}
